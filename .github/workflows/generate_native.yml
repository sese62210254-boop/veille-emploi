name: ⚙️ Générer Dossier Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.22.0'
    - name: Créer les dossiers
      run: |
        cd app_mobile
        flutter create .
    - name: Commit et Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add app_mobile/android app_mobile/ios
        git commit -m "feat: génération des dossiers android et ios"
        git push
