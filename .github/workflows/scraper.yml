name: 🤖 Aspirateur de Veille Automatique

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  scraping:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Installation de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: 📦 Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 Lancement de la Veille
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
        GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python run_once.py

    - name: 💾 Sauvegarde de la Base de Données
      run: |
        git config --global user.name "Robot de Veille"
        git config --global user.email "bot@veille.com"
        git add opportunites.db
        git add sources.json
        git commit -m "Mise à jour automatique des offres 🤖" || echo "Aucune nouvelle offre à sauvegarder"
        git push
